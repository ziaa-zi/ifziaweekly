<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data Mahasiswa</title>
</head>
<body>
    <h2>Tambah Data Mahasiswa</h2>
    <form action="mahasiswa.html" method="post">
        <table cellpadding="5px">
            <tr>
                <td><label for="nama">Nama</label></td>
                <td>:</td>
                <td><input type="text" id="nama" name="name"/></td>
            </tr>
            <tr>
                <td><label for="foto">Foto</label></td>
                <td>:</td>
                <td><input type="file" id="" name="foto"/></td>
            </tr>
            <tr>
                <td><label for="uts">UTS</label></td>
                <td>:</td>
                <td><input type="number" id="uts" name="uts"/></td>
            </tr>
            <tr>
                <td><label for="uas">UAS</label></td>
                <td>:</td>
                <td><input type="number" id="uas" name="uas"/></td>
            </tr>
             <tr>
                <td><label for="tugas">TUGAS</label></td>
                <td>:</td>
                <td><input type="number" id="tugas" name="tugas"/></td>
            </tr>
            <tr>
                <td colspan="3">
                    <button type="submit" name="submit">Tambah</button>
                </td>
            </tr>
        </table>
    </form>
    <br>
    <hr>

    <form action="">
        <table cellpadding="5px">
            <tr>
                <td><label for="nama">Nama</label></td>
                <td>:</td>
                <td><input type="text" id="nama" name="name"/></td>
            </tr>
             <tr>
                <td><label for="nim">Nim</label></td>
                <td>:</td>
                <td><input type="number" id="nim" name="nim"/></td>
            </tr>
             <tr>
                <td><label for="password">Password</label></td>
                <td>:</td>
                <td><input type="password" id="password" name="password"/></td>
            </tr>
             <tr>
                <td><label for="email">Email</label></td>
                <td>:</td>
                <td><input type="email" id="email" name="email"/></td>
            </tr>
             <tr>
                <td><label for="no_hp">No HP</label></td>
                <td>:</td>
                <td><input type="tel" id="no_hp" name="no_hp"/></td>
            </tr>
             <tr>
                <td><label for="website_pribadi">Website pribadi</label></td>
                <td>:</td>
                <td><input type="url" id="website_pribadi" name="website_pribadi"/></td>
            </tr>
             <tr>
                <td><label for="tgl_lahir">Tanggal Lahir</label></td>
                <td>:</td>
                <td><input type="date" id="tgl_lahir" name="tgl_lahir"/></td>
            </tr>
             <tr>
                <td><label for="warna">Warna Favorit</label></td>
                <td>:</td>
                <td><input type="color" id="warna" name="warna"/></td>
            </tr> 
            <tr>
                <td><label for="tingkat_kepuasan">Tingkat kepuasan</label></td>
                <td>:</td>
                <td><input type="range" id="tingkat_kepuasan" name="tingkat_kepuasan"/></td>
            </tr>
            <tr>
                <td><label for="jk">Jenis kelamin</label></td>
                <td>:</td>
                <td><input type="radio" id="jk" name="jk"/></td>
            </tr>
            <tr>
                <td><label for="hobi">Hobi</label></td>
                <td>:</td>
                <td>
                    <input type="checkbox" id="olahraga" name="tenis"/>
                    <input type="checkbox" id="olahraga" name="futsal"/>
                    <input type="checkbox" id="olahraga" name="basket"/>
                </td>
            </tr>
            <tr>
                <td><label for="foto">Upload Foto</label></td>
                <td>:</td>
                <td><input type="file" id="" name="foto"/></td>
            </tr>
            <tr>
                <td><label for="alamat">Alamat</label></td>
                <td>:</td>
                <td><input type="textarea" id="alamat" name="alamat"/></td>
            </tr>
            <tr>
                <td><label for="jurusan">Jurusan</label></td>
                <td>:</td>
                <td><input type="select option" id="jurusan" name="jurusan"/></td>
            </tr>
            <tr>
                <td colspan="3">
                    <button type="submit" name="submit">Tambah</button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
